---
name: Deploy Flutter Web to GitHub Pages

"on":
  push:
    branches: [main]

# Sets permissions to allow deployment to GitHub Pages and create releases
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and latest queued. However, do NOT cancel
# in-progress runs as we want to allow these production deployments
# to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true
          cache-key: flutter-3.22.3

      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub deps
          
      - name: Clean and prepare build
        run: |
          flutter clean
          flutter pub get

      - name: Enable web support
        run: flutter config --enable-web

      - name: Build web app
        run: |
          flutter doctor -v
          flutter build web --release --base-href=/portfolio/ --verbose --dart-define=FLUTTER_WEB_USE_SKIA=true
          
      - name: Verify build output
        run: |
          ls -la build/web/
          test -f build/web/index.html || (echo "index.html not found in build output" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: deploy-${{ github.run_number }}
          name: Portfolio Deployment ${{ github.run_number }}
          body: |
            🚀 **Portfolio Successfully Deployed**

            **GitHub Pages URL:** ${{ steps.deployment.outputs.page_url }}

            **Deployment Details:**
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Run ID: ${{ github.run_id }}
            - Deployment Time: ${{ github.event.head_commit.timestamp }}

            This release was automatically created when the portfolio was
            deployed to GitHub Pages.
          draft: false
          prerelease: false
          generate_release_notes: true
