<!DOCTYPE html>
<html>
<head>
  <base href="/portfolio/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Professional Portfolio - Software Developer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Portfolio</title>
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Roboto", "Noto", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      height: 100vh;
    }
    
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1000;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Ensure Flutter glass pane doesn't interfere */
    flt-glass-pane {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div>Loading Portfolio...</div>
  </div>
  
  <script src="flutter.js" defer></script>
  <script>
    // Ensure service worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
    
    window.addEventListener('load', function(ev) {
      var loading = document.getElementById('loading');
      
      // Set a fallback timeout in case Flutter doesn't load
      var fallbackTimeout = setTimeout(function() {
        console.warn('Flutter loading timeout - hiding loading screen');
        if (loading && loading.style.display !== 'none') {
          loading.style.display = 'none';
        }
      }, 10000);
      
      // Initialize Flutter app
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: window.serviceWorkerVersion || null,
        }
      }).then(function(engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        // Clear the fallback timeout
        clearTimeout(fallbackTimeout);
        // Hide loading screen
        if (loading) {
          loading.style.display = 'none';
        }
        // Run the Flutter app
        return appRunner.runApp();
      }).catch(function(error) {
        console.error('Flutter initialization error:', error);
        // Clear the fallback timeout and hide loading screen even on error
        clearTimeout(fallbackTimeout);
        if (loading) {
          loading.innerHTML = '<div style="color: #ff6b6b;">Error loading portfolio. Please refresh the page.</div>';
        }
      });
    });
  </script>
</body>
</html>
